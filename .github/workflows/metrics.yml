name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-isocalendar.svg
          template: classic
          base: ""
          config_timezone: America/Argentina/Buenos_Aires
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Generate starred topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-topics.svg
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: starred
          plugin_topics_limit: 50

      - name: Generate coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-habits.svg
          template: classic
          base: ""
          config_timezone: America/Argentina/Buenos_Aires
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_languages_limit: 8

      - name: Generate 16personalities profile
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-16personalities.svg
          template: classic
          base: ""
          plugin_16personalities: yes
          plugin_16personalities_url: https://www.16personalities.com/profiles/f210f18446ae3
          plugin_16personalities_sections: personality, profile, traits
          plugin_16personalities_scores: yes

      - name: Generate AniList card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-anilist.svg
          template: classic
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: ShiningMonster
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, watching, reading
          plugin_anilist_limit: 4
          plugin_anilist_shuffle: no