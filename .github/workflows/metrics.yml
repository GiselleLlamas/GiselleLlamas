name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate unified metrics card
        id: main
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics.svg
          template: classic
          base: header, community
          config_timezone: America/Argentina/Buenos_Aires
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: starred
          plugin_topics_limit: 50
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: push
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_order: base.header, isocalendar, topics, base.community, activity, languages

      - name: Hide unified metrics card when generation fails
        if: steps.main.outcome != 'success'
        run: |
          cat > github-metrics.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="Metrics unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG

      - name: Generate AniList fallback showcase card
        run: node .github/scripts/generate-anilist-card.mjs
        env:
          ANILIST_USER: ShiningMonster
          ANILIST_SVG: github-metrics-anilist.svg

      - name: Generate 16Personalities fallback showcase card
        run: node .github/scripts/generate-personality-card.mjs
        env:
          PERSONALITY_SVG: github-metrics-16personalities.svg
