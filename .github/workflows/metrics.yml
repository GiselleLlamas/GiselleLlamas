name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate isometric calendar
        id: isocalendar
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-isocalendar.svg
          template: classic
          base: ""
          config_timezone: America/Argentina/Buenos_Aires
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Hide isometric calendar when generation fails
        if: steps.isocalendar.outcome != 'success'
        run: |
          cat > github-metrics-isocalendar.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="Isometric calendar unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG

      - name: Generate starred topics
        id: topics
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-topics.svg
          template: classic
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: starred
          plugin_topics_limit: 50

      - name: Hide starred topics when generation fails
        if: steps.topics.outcome != 'success'
        run: |
          cat > github-metrics-topics.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="Starred topics unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG

      - name: Generate curated metrics
        id: habits
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-habits.svg
          template: classic
          base: community
          config_timezone: America/Argentina/Buenos_Aires
          plugin_activity: yes
          plugin_activity_limit: 8
          plugin_activity_days: 30
          plugin_activity_filter: push
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          config_order: base.community, activity, languages

      - name: Hide coding activity when generation fails
        if: steps.habits.outcome != 'success'
        run: |
          cat > github-metrics-habits.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="Coding activity unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG

      - name: Generate 16personalities profile (screenshot fallback)
        id: personality
        continue-on-error: true
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GiselleLlamas
          filename: github-metrics-16personalities.svg
          template: classic
          base: ""
          plugin_screenshot: yes
          plugin_screenshot_title: 16personalities Profile
          plugin_screenshot_url: https://www.16personalities.com/profiles/f210f18446ae3
          plugin_screenshot_selector: main

      - name: Hide 16personalities card when generation fails
        if: steps.personality.outcome != 'success'
        run: |
          cat > github-metrics-16personalities.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="16personalities unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG

      - name: Setup Node for custom AniList card
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright runtime
        run: npm install --no-save playwright@1.52.0

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate AniList custom card
        id: anilist_custom
        continue-on-error: true
        run: node .github/scripts/generate-anilist-card.mjs
        env:
          ANILIST_USER: ShiningMonster
          ANILIST_LIMIT: "4"
          ANILIST_SVG: github-metrics-anilist.svg

      - name: Hide AniList card when generation fails
        if: steps.anilist_custom.outcome != 'success'
        run: |
          cat > github-metrics-anilist.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="928" height="1" viewBox="0 0 928 1" role="img" aria-label="AniList card unavailable">
            <rect width="928" height="1" fill="transparent" />
          </svg>
          SVG